name: station_app
description: "KDS — Kitchen Display System para estaciones Grimorio"
publish_to: 'none'

version: 1.0.4+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # SignalR
  signalr_netcore: ^1.3.5

  # HTTP / Auth
  http: ^1.2.2
  shared_preferences: ^2.3.3

  # Estado
  provider: ^6.1.2

  # UUID
  uuid: ^4.5.1

  # Text-to-speech
  flutter_tts: ^4.2.0

  # Mantener pantalla encendida
  wakelock_plus: ^1.2.10

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
